<!DOCTYPE html>
<html>
<head>
  <title>Flag Checker</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #f1f5f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 30px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      text-align: center;
    }

    h2 {
      margin-bottom: 15px;
    }

    .steps {
      text-align: left;
      font-size: 13px;
      background: rgba(255,255,255,0.05);
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 15px;
      line-height: 1.6;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-bottom: 15px;
      background: #1e293b;
      color: #fff;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #38bdf8;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }

    #result {
      margin-top: 20px;
      font-weight: bold;
      color: #22c55e;
      word-wrap: break-word;
    }

    .map-card {
      margin-top: 20px;
      border-radius: 12px;
      overflow: hidden;
      background: #111827;
      text-align: left;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }

    .map-card:hover {
      transform: scale(1.02);
    }

    .map-image {
      width: 100%;
      height: 150px;
      background: url('review.png') center/cover;
    }

    .map-content {
      padding: 12px;
    }

    .map-title {
      font-size: 14px;
      font-weight: bold;
    }

    .map-sub {
      font-size: 12px;
      color: #9ca3af;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>Flag Checker</h2>

    <!-- Steps -->
    <div class="steps">
      <strong>Steps to Claim Flag:</strong><br>
      1. Click the map card below<br>
      2. Add a review on the page<br>
      3. Copy the greeting message shown after review<br>
      4. Paste it in the input above<br>
      5. Submit to claim your flag 🚩
    </div>

    <input type="text" id="msg" placeholder="Paste message here">
    <button onclick="checkFlag()">Submit</button>

    <p id="result"></p>

    <!-- Map Card -->
    <div class="map-card" onclick="openMap()">
      <div class="map-image"></div>
      <div class="map-content">
        <div class="map-title">Leave a Review</div>
        <div class="map-sub">Tap to open in Google Maps</div>
      </div>
    </div>
  </div>

  <script>
    async function checkFlag() {
      const message = document.getElementById("msg").value;

      const res = await fetch("/api/check", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message })
      });

      const data = await res.json();
      document.getElementById("result").innerText = data.flag;
    }

    function openMap() {
      window.open("https://maps.app.goo.gl/PfW1mYGtQ7fSjYCH7", "_blank");
    }
  </script>
</body>
</html>
